{% extends 'pizzeria/base.html' %}
{% load static %}

{% block content %}
<section id="register" class="py-12 bg-gray-100">
    <div class="container mx-auto px-4">
        <h2 class="text-3xl font-bold text-center mb-8">Registrarse</h2>

        <!-- Mostrar mensajes de éxito/error -->
        {% if messages %}
            <div class="max-w-md mx-auto mb-6">
                {% for message in messages %}
                    <div class="p-4 rounded-lg {% if message.tags == 'success' %}bg-green-100 text-green-700{% else %}bg-red-100 text-red-700{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <!-- Formulario -->
        <form method="post" class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-md">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="w-full bg-orange-500 text-white p-3 rounded-lg hover:bg-orange-600 transition-colors font-semibold">Registrarse</button>
        </form>
        <p class="text-center mt-4">
            ¿Ya tienes una cuenta? <a href="{% url 'login' %}" class="text-orange-500 hover:underline">Inicia sesión</a>
        </p>
    </div>
</section>
{% endblock %}
