{% extends 'pizzeria/base.html' %}
{% load static %}

{% block content %}
<section id="gallery" class="py-12 bg-gray-100">
    <div class="container mx-auto px-4">
        <h2 class="text-3xl font-bold text-center mb-8">Galería</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <img src="{% static 'img/pizza1.jpg' %}" alt="Pizza 1" class="w-full h-64 object-cover rounded-lg shadow-md">
            <img src="{% static 'img/pizza2.jpg' %}" alt="Pizza 2" class="w-full h-64 object-cover rounded-lg shadow-md">
            <img src="{% static 'img/pizza3.jpg' %}" alt="Pizza 3" class="w-full h-64 object-cover rounded-lg shadow-md">
        </div>
    </div>
</section>
{% endblock %}
